<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>NexusAI — Intelligent FAQ Chatbot</title>
<link rel="stylesheet" href="style.css"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
</head>
<body class="dark">

<!-- ── Sidebar ── -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-mark">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <polygon points="14,7 21,11 21,17 14,21 7,17 7,11" fill="currentColor" opacity="0.3"/>
          <circle cx="14" cy="14" r="3" fill="currentColor"/>
        </svg>
      </div>
      <span class="logo-text">NexusAI</span>
    </div>
    <button class="new-chat-btn" id="newChatBtn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      New Chat
    </button>
  </div>

  <div class="sidebar-section">
    <p class="sidebar-label">Topics</p>
    <div class="topic-list" id="topicList">
      <div class="topic-skeleton"></div>
      <div class="topic-skeleton"></div>
      <div class="topic-skeleton"></div>
      <div class="topic-skeleton"></div>
      <div class="topic-skeleton"></div>
    </div>
  </div>

  <div class="sidebar-footer">
    <div class="theme-toggle-row">
      <div class="theme-label-group">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <span class="theme-label">Dark Mode</span>
      </div>
      <label class="toggle-switch">
        <input type="checkbox" id="themeToggle" checked/>
        <span class="slider"></span>
      </label>
    </div>
  </div>
</aside>

<!-- ── Main ── -->
<main class="main">

  <!-- Header -->
  <header class="chat-header">
    <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="header-center">
      <span class="header-title">NexusAI</span>
      <span class="header-subtitle">Intelligent FAQ Assistant</span>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="voiceBtn" title="Voice Input" aria-label="Voice input">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <div class="status-indicator" id="statusDot" title="Server status">
        <div class="status-dot"></div>
        <span class="status-text">Connecting…</span>
      </div>
    </div>
  </header>

  <!-- Messages -->
  <div class="messages-container" id="messagesContainer">
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-badge">AI · FAQ · 500+ Answers</div>
      <div class="welcome-icon">
        <svg width="48" height="48" viewBox="0 0 28 28" fill="none">
          <polygon points="14,2 26,8 26,20 14,26 2,20 2,8" fill="none" stroke="currentColor" stroke-width="1.5"/>
          <polygon points="14,7 21,11 21,17 14,21 7,17 7,11" fill="currentColor" opacity="0.25"/>
          <circle cx="14" cy="14" r="3.5" fill="currentColor"/>
        </svg>
      </div>
      <h1 class="welcome-title">Hello, I'm <span class="gradient-text">NexusAI</span></h1>
      <p class="welcome-sub">Your intelligent technical FAQ assistant. Ask me anything about AI, coding, cloud, DevOps, and more.</p>
      <div class="suggestion-grid" id="suggestionGrid"></div>
    </div>
  </div>

  <!-- Input Bar -->
  <div class="input-area">
    <div class="input-bar" id="inputBar">
      <button class="mic-btn" id="voiceBtnInline" title="Voice Input" aria-label="Voice input">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <textarea
        id="chatInput"
        class="chat-textarea"
        placeholder="Ask me anything about AI, coding, cloud, DevOps…"
        rows="1"
        maxlength="1000"
        aria-label="Chat message input"
      ></textarea>
      <button class="send-btn" id="sendBtn" title="Send message" aria-label="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="input-hint">
      <kbd>Enter</kbd> to send &nbsp;·&nbsp; <kbd>Shift+Enter</kbd> for newline
    </p>
  </div>
</main>

<!-- Toast -->
<div class="toast" id="toast" role="alert" aria-live="polite"></div>

<script src="script.js"></script>
</body>
</html>
