version: "3.9"

services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      LIBRE_TRANSLATE_URL: ${LIBRE_TRANSLATE_URL:-https://libretranslate.com}
      LIBRE_TRANSLATE_API_KEY: ${LIBRE_TRANSLATE_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      MYMEMORY_EMAIL: ${MYMEMORY_EMAIL:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
      LOG_LEVEL: info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    image: nginx:alpine
    ports:
      - "5173:80"
    volumes:
      - ./client/dist:/usr/share/nginx/html:ro
    depends_on:
      - server
    restart: unless-stopped
